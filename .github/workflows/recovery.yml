name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v3

    - name: Debug input
      run: |
        echo "RECOVERY_URL from input:"
        echo "${{ github.event.inputs.RECOVERY_URL }}"

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 unzip -y

    - name: Fetch image from URL
      run: |
        echo "Downloading from: ${{ github.event.inputs.RECOVERY_URL }}"
        wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img || (echo "Download failed" && exit 1)
        echo "Listing recovery.img:"
        ls -lh recovery.img || echo "File not found"
        mv recovery.img r.img

    - name: Make magiskboot executable
      run: chmod +x magiskboot

    - name: Verify magiskboot
      run: file magiskboot

    - name: Patch Process-2
      run: |
        chmod +x script2.sh
        ./script2.sh
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $(wc -c r.img | cut -f 1 -d ' ') \
          --image recovery-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096
        mkdir -p output
        mv recovery-patched.img output/recovery.img
        tar -cvf output/fastbootd-recovery.tar -C output recovery.img

    - name: Upload Recovery
      uses: actions/upload-artifact@v4
      with:
        name: Patched-Recovery
        path: output/fastbootd-recovery.tar
